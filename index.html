<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual Translation App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <!-- Header -->
        <div class="header">
            <h1 class="app-title">Multilingual Translation Web Application</h1>
            <button id="themeToggle" class="theme-btn" title="Toggle dark mode">
                <img id="iconMoon" src="icons/moon.svg" width="18" height="18" alt="Dark mode">
                <img id="iconSun"  src="icons/sun.svg"  width="18" height="18" alt="Light mode" style="display:none;">
            </button>
        </div>

        <!-- Language Selectors -->
        <div class="lang-bar">
            <select id="detectLang">
                <option value="autodetect">Detect Language</option>
            </select>
            <select id="sourceLang">
                <option value="en" selected>English</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ar">Arabic</option>
                <option value="zh-CN">Chinese</option>
                <option value="ja">Japanese</option>
            </select>
            <button id="swapBtn" title="Swap languages">
                <img src="icons/swap.svg" width="18" height="18" alt="Swap">
            </button>
            <select id="targetLang">
                <option value="en">English</option>
                <option value="fr" selected>French</option>
                <option value="es">Spanish</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ar">Arabic</option>
                <option value="zh-CN">Chinese</option>
                <option value="ja">Japanese</option>
            </select>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <!-- Text Cards -->
        <div class="cards">

            <div class="card">
                <span class="card-label">Input</span>
                <textarea id="inputText" maxlength="500">Hello, how are you</textarea>
                <div class="card-footer">
                    <div class="card-actions">
                        <button onclick="speak('inputText')">
                            <img src="icons/speaker.svg" width="15" height="15" alt=""> Listen
                        </button>
                        <button onclick="copyText('inputText')">
                            <img src="icons/copy.svg" width="15" height="15" alt=""> Copy
                        </button>
                    </div>
                    <span id="charCount">18/500</span>
                </div>
            </div>

            <div class="card output-card">
                <span class="card-label">Output</span>
                <div id="loader" style="display:none;">
                    <div class="spinner"></div>
                </div>
                <textarea id="outputText" readonly placeholder="Translation will appear here..."></textarea>
                <div class="card-footer">
                    <div class="card-actions">
                        <button onclick="speak('outputText')">
                            <img src="icons/speaker.svg" width="15" height="15" alt=""> Listen
                        </button>
                        <button onclick="copyText('outputText')">
                            <img src="icons/copy.svg" width="15" height="15" alt=""> Copy
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <!-- Translate Button -->
        <button id="translateBtn">Translate</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
